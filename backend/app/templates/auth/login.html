<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | تمكين</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1>تمكين ✦</h1>
      <p>منصة ربط الطلاب بالشركات بالذكاء الاصطناعي</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني الرسمي</label>
        <input type="email" id="email" class="form-control" placeholder="example@university.edu.iq" required>
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
        <span id="btn-text">تسجيل الدخول</span>
        <span id="btn-loader" class="loader" style="display:none"></span>
      </button>
    </form>

    <div class="auth-link" style="margin-top:1.5rem">
      ليس لديك حساب؟ <a href="/auth/register">إنشاء حساب جديد</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/main.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');
  const btnLoader = document.getElementById('btn-loader');
  btn.disabled = true; btnText.style.display='none'; btnLoader.style.display='inline-block';

  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    })
  });
  const data = await res.json();

  btn.disabled = false; btnText.style.display='inline'; btnLoader.style.display='none';

  if (res.ok) {
    showToast('مرحباً بك! جاري التوجيه...', 'success');
    setTimeout(() => window.location.href = data.redirect, 800);
  } else {
    const box = document.getElementById('alert-box');
    box.innerHTML = `<div class="alert alert-danger" style="margin-bottom:1rem">⚠️ ${data.detail}</div>`;
  }
});
</script>
</body>
</html>
