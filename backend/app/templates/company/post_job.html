{% extends "base.html" %}
{% block title %}نشر وظيفة{% endblock %}

{% block content %}
<div class="page-header">
  <h2>📢 نشر إعلان وظيفي جديد</h2>
  <p>حدد متطلباتك وسيقوم النظام بعرض الطلاب المؤهلين تلقائياً</p>
</div>

<div style="max-width:700px;margin:0 auto">
  <div id="alert-box"></div>
  <form id="job-form" class="card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">المسمى الوظيفي</label>
        <input type="text" name="title" class="form-control" placeholder="مهندس برمجيات أول" required>
      </div>
      <div class="form-group">
        <label class="form-label">القسم / الإدارة</label>
        <input type="text" name="department" class="form-control" placeholder="قسم تطوير البرمجيات" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">التخصص الدراسي المطلوب</label>
        <select name="required_major" class="form-control" required>
          <option value="">اختر التخصص</option>
          <option>علوم الحاسوب</option><option>هندسة البرمجيات</option>
          <option>هندسة الشبكات</option><option>نظم المعلومات</option>
          <option>الهندسة الكهربائية</option><option>الهندسة المدنية</option>
          <option>الهندسة الميكانيكية</option><option>الطب البشري</option>
          <option>إدارة الأعمال</option><option>المحاسبة</option><option>الاقتصاد</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">المحافظة</label>
        <select name="province" class="form-control" required>
          <option value="">اختر المحافظة</option>
          <option>بغداد</option><option>البصرة</option><option>نينوى</option>
          <option>أربيل</option><option>السليمانية</option><option>دهوك</option>
          <option>كركوك</option><option>الأنبار</option><option>ديالى</option>
          <option>بابل</option><option>كربلاء</option><option>النجف</option>
          <option>واسط</option><option>ميسان</option><option>ذي قار</option>
          <option>المثنى</option><option>القادسية</option><option>صلاح الدين</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الحد الأدنى لدرجة اختبار التأهيل (%)</label>
        <input type="number" name="min_exam_score" class="form-control" value="60" min="0" max="100" required>
        <span class="form-hint">الطلاب الذين يحققون هذه الدرجة فأعلى سيظهرون كمتقدمين مؤهلين</span>
      </div>
      <div class="form-group">
        <label class="form-label">نوع التوظيف</label>
        <select name="employment_type" class="form-control">
          <option>دوام كامل</option><option>دوام جزئي</option>
          <option>تدريب</option><option>عن بُعد</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الحد الأدنى للمعدل التراكمي</label>
        <input type="number" name="min_gpa" class="form-control" value="0" min="0" max="4" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">الراتب المتوقع (اختياري)</label>
        <input type="text" name="salary_range" class="form-control" placeholder="750,000 — 1,200,000 دينار">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">وصف الوظيفة</label>
      <textarea name="description" class="form-control" rows="4" placeholder="اكتب وصفاً تفصيلياً للوظيفة ومهامها..." required></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">المتطلبات والمهارات (اختياري)</label>
      <textarea name="requirements" class="form-control" rows="3" placeholder="المهارات والخبرات المطلوبة..."></textarea>
    </div>
    <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:0.5rem">
      <a href="/company/dashboard" class="btn btn-secondary">إلغاء</a>
      <button type="submit" class="btn btn-primary btn-lg">
        <span class="btn-text">نشر الإعلان</span>
        <span class="loader" style="display:none"></span>
      </button>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('job-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const btnText = btn.querySelector('.btn-text');
  const loader = btn.querySelector('.loader');
  btn.disabled = true; btnText.style.display='none'; loader.style.display='inline-block';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());
  data.min_exam_score = parseFloat(data.min_exam_score);
  data.min_gpa = parseFloat(data.min_gpa);

  const res = await fetch('/company/jobs', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  const result = await res.json();
  btn.disabled = false; btnText.style.display='inline'; loader.style.display='none';

  const box = document.getElementById('alert-box');
  if (res.ok) {
    box.innerHTML = `<div class="alert alert-success" style="margin-bottom:1rem">✅ ${result.message}</div>`;
    showToast('تم نشر الإعلان بنجاح!', 'success');
    setTimeout(() => window.location.href = '/company/dashboard', 1200);
  } else {
    box.innerHTML = `<div class="alert alert-danger" style="margin-bottom:1rem">⚠️ ${result.detail}</div>`;
  }
});
</script>
{% endblock %}
